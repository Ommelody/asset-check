document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

g: 7px 6px calc(7px + env(safe-area-inset-bottom));\">\n      <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ n.onClick }}\" style=\"display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; color: {{ n.color }};\">\n          <span style=\"position: relative;\" dangerouslysetinnerhtml=\"{{ n.icon }}\"><\u002Fspan>\n          <span style=\"font-size: 10.5px; font-weight: 600;\">{{ n.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <!-- ===== Detail Bottom Sheet ===== -->\n    <sc-if value=\"{{ hasCurrent }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ onCloseDetail }}\" style=\"position: fixed; inset: 0; z-index: 50; background: rgba(13,20,33,.45); display: flex; align-items: flex-end; justify-content: center; animation: fade .2s;\">\n        <div onclick=\"{{ stopProp }}\" style=\"width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; background: #f6f7f9; border-radius: 22px 22px 0 0; animation: sheetUp .28s cubic-bezier(.2,.8,.2,1);\">\n          <div style=\"position: sticky; top: 0; background: #f6f7f9; padding: 12px 18px 8px; z-index: 2;\">\n            <div style=\"width: 40px; height: 5px; border-radius: 999px; background: #d3dae4; margin: 0 auto 12px;\"><\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <div style=\"flex: 1; min-width: 0;\">\n                <div class=\"mono\" style=\"font-size: 17px; font-weight: 700; color: #0e1626; word-break: break-all;\">{{ cur.code }}<\u002Fdiv>\n                <div style=\"font-size: 13.5px; color: #5a6678; margin-top: 2px;\">{{ cur.name }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ onCloseDetail }}\" style=\"flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; background: #e9edf2; color: #6b7688; font-size: 18px; display: flex; align-items: center; justify-content: ce isplay: flex; align-items: center; gap: 11px; padding: 13px 14px; border-radius: 13px; border: 2px solid {{ o.border }}; background: {{ o.bg }}; text-align: left;\">\n                  <span style=\"width: 22px; height: 22px; border-radius: 50%; border: 2px solid {{ o.dot }}; background: {{ o.dotFill }}; flex-shrink: 0; display: flex; align-items: center; justify-content: center;\">\n                    <span style=\"width: 9px; height: 9px; border-radius: 50%; background: {{ o.innerDot }};\"><\u002Fspan>\n                  <\u002Fspan>\n                  <span style=\"font-size: 14px; font-weight: 600; color: {{ o.textColor }};\">{{ o.label }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- location -->\n            <div style=\"margin-top: 16px; font-size: 13px; font-weight: 700; color: #3a4658;\">อัปเดตที่ตั้ง<\u002Fdiv>\n            <div style=\"margin-top: 9px; background: #fff; border: 1px solid #e7ebf1; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 11px;\">\n              <label style=\"display: block;\">\n                <span style=\"font-size: 12px; color: #8a96a8; font-weight: 500;\">ชั้น (AK)<\u002Fspan>\n                <input value=\"{{ draftFloor }}\" onchange=\"{{ onDraftFloor }}\" list=\"dl-floors\" placeholder=\"เลือกหรือพิมพ์\" style=\"width: 100%; margin-top: 5px; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #dde3ec; font-size: 14px; background: #f8fafc;\">\n              <\u002Flabel>\n              <label style=\"display: block;\">\n                <span style=\"font-size: 12px; color: #8a96a8; font-weight: 500;\">แผนก (AL)<\u002Fspan>\n                <input value=\"{{ draftDept }}\" onchange=\"{{ onDraftDept }}\" list=\"dl-depts\" placeholder=\"เลือกหรือพิมพ์\" style=\"width: 100%; margin-top: 5px; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #dde3ec; font-size: 14px; background: #f8fafc;\">\n              <\u002Flabel>\n              <label style=\"display: block;\">\n                <span style=\"font-size: 12px; color: #8a96a8; font-weight: 500;\">ห้อง (AM)<\u002Fspan>\n                <input value=\"{{ draftRoom }}\" onchange=\"{{ onDraftRoom }}\" list=\"dl-rooms\" placeholder=\"เลือกหรือพิมพ์\" style=\"width: 100%; margin-top: 5px; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #dde3ec; font-size: 14px; background: #f8fafc;\">\n              <\u002Flabel>\n            <\u002Fdiv>\n\n            <div style=\"height: 16px;\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- save bar -->\n          <div style=\"position: sticky; bottom: 0; background: linear-gradient(180deg, rgba(246,247,249,0), #f6f7f9 28%); padding: 14px 18px calc(16px + env(safe-area-inset-bottom));\">\n            <button onclick=\"{{ onSaveCurrent }}\" style=\"width: 100%; padding: 15px; border-radius: 14px; font-size: 15px; font-weight: 700; color: #fff; background: {{ saveBtnBg }}; opacity: {{ saveBtnOpacity }};\">{{ saveBtnLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- datalists -->\n    <datalist id=\"dl-floors\"><sc-for list=\"{{ floorOpts }}\" as=\"o\" hint-placeholder-count=\"0\"><option value=\"{{ o }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist>\n    <datalist id=\"dl-depts\"><sc-for list=\"{{ deptOpts }}\" as=\"o\" hint-placeholder-count=\"0\"><option value=\"{{ o }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist>\n    <datalist id=\"dl-rooms\"><sc-for list=\"{{ roomOpts }}\" as=\"o\" hint-placeholder-count=\"0\"><option value=\"{{ o }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist>\n\n    <!-- toast -->\n    <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: fixed; left: 50%; bottom: 88px; transform: translateX(-50%); z-index: 80; max-width: 92%; background: {{ toastBg }}; color: #fff; padding: 12px 18px; border-radius: 13px; font-size: 13.5px; font-weight: 600; box-shadow: 0 10px 30px rgba(13,20,33,.28); display: flex; align-items: center; gap: 9px; animation: pop .25s;\">\n        <span style=\"font-size: 16px;\">{{ toastIcon }}<\u002Fspan>{{ toastMsg }}\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst STATUS = {\n  'ติดแล้ว พื้นผิวปกติ': { color: '#16a34a', bg: '#dcfce7', short: 'ปกติ' },\n  'ติดแล้ว พิ้นผิวโลหะ': { color: '#2563eb', bg: '#dbeafe', short: 'โลหะ' },\n  'ไม่พบ':              { color: '#dc2626', bg: '#fee2e2', short: 'ไม่พบ' },\n};\nconst STATUS_ORDER = ['ติดแล้ว พื้นผิวปกติ', 'ติดแล้ว พิ้นผิวโลหะ', 'ไม่พบ'];\nconst LS_EDITS = 'qrinv.edits.v1';\nconst LS_HOOK  = 'qrinv.webhook.v1';\nconst LS_RECENT = 'qrinv.recent.v1';\n\nconst ICONS = {\n  scan: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 7V5a1 1 0 0 1 1-1h2M20 7V5a1 1 0 0 0-1-1h-2M4 17v2a1 1 0 0 0 1 1h2M20 17v2a1 1 0 0 1-1 1h-2M3 12h18\"/><\u002Fsvg>',\n  list: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01\"/><\u002Fsvg>',\n  chart: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"/><rect x=\"7\" y=\"11\" width=\"3\" height=\"6\"/><rect x=\"13\" y=\"7\" width=\"3\" height=\"10\"/><\u002Fsvg>',\n  gear: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"/><path d=\"M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1\"/><\u002Fsvg>',\n};\n\nclass Component extends DCLogic {\n  videoRef = React.createRef();\n  canvasRef = React.createRef();\n\n  state = {\n    loading: true,\n    assets: [],\n    options: { floors: [], depts: [], rooms: [] },\n    edits: {},\n    view: 'scan',\n    cameraOn: false,\n    continuous: false,\n    manualCode: '',\n    recent: [],\n    current: null,       // asset object\n    draft: null,         // { status, floor, dept, room }\n    searchTerm: '',\n    filterStatus: 'all',\n    filterFloor: '',\n    listLimit: 50,\n    webhookUrl: '',\n    connMsg: null,       // { type:'ok'|'err'|'info', text }\n    syncing: false,\n    toast: null,\n  };\n\n  // ---------- lifecycle ----------\n  componentDidMount() {\n    try { this.setState({ edits: JSON.parse(localStorage.getItem(LS_EDITS) || '{}') }); } catch (e) {}\n    try { this.setState({ webhookUrl: localStorage.getItem(LS_HOOK) || '' }); } catch (e) {}\n    try { this.setState({ recent: JSON.parse(localStorage.getItem(LS_RECENT) || '[]') }); } catch (e) {}\n    this.loadData();\n  }\n  componentWillUnmount() { this.stopCamera(); }\n\n  async loadData() {\n    try {\n      let a, o;\n      if (window.__ASSETS__ && window.__OPTIONS__) {   // ไฟล์เดียวแบบ standalone (ฝังข้อมูล)\n        a = window.__ASSETS__;\n        o = window.__OPTIONS__;\n      } else {                   // โหมดพัฒนา: โหลดจากโฟลเดอร์ data/\n        [a, o] = await Promise.all([\n          fetch('data/assets.json').then(r => r.json()),\n          fetch('data/options.json').then(r => r.json()),\n        ]);\n      }\n      this.index = new Map();\n      for (const it of a) this.index.set(this.norm(it.code), it);\n      this.setState({ assets: a, options: o, loading: false });\n    } catch (e) {\n      this.setState({ loading: false, toast: { type: 'err', text: 'โหลดข้อมูลไม่สำเร็จ' } });\n    }\n  }\n\n  // ---------- helpers ----------\n  norm(s) { return String(s == null ? '' : s).trim().toUpperCase(); }\n  normFloor(s) {\n    s = String(s || '').trim();\n    const m = s.match(/^(\\d+)$/);\n    if (m) return 'ชั้น ' + m[1];\n    return s;\n  }\n  persistEdits(edits) { try { localStorage.setItem(LS_EDITS, JSON.stringify(edits)); } catch (e) {} }\n  persistRecent(recent) { try { localStorage.setItem(LS_RECENT, JSON.stringify(recent)); } catch (e) {} }\n  effStatus(code) { const e = this.state.edits[this.norm(code)]; if (e && e.status) return e.status; const a = this.index && this.index.get(this.norm(code)); return a ? a.status : ''; }\n  beep(ok) {\n    try {\n      const ac = this._ac || (this._ac = new (window.AudioContext || window.webkitAudioContext)());\n      const o = ac.createOscillator(), g = ac.createGain();\n      o.connect(g); g.connect(ac.destination);\n      o.frequency.value = ok ? 880 : 280;\n      g.gain.setValueAtTime(0.0001, ac.currentTime);\n      g.gain.exponentialRampToValueAtTime(0.25, ac.currentTime + 0.01);\n      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.18);\n      o.start(); o.stop(ac.currentTime + 0.2);\n    } catch (e) {}\n  }\n  showToast(type, text, ms) {\n    this.setState({ toast: { type, text } });\n    clearTimeout(this._toastT);\n    this._toastT = setTimeout(() => this.setState({ toast: null }), ms || 2200);\n  }\n\n  // ---------- camera ----------\n  async toggleCamera() { if (this.state.cameraOn) this.stopCamera(); else await this.startCamera(); }\n  async startCamera() {\n    try {\n      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });\n      this._stream = stream;\n      this.setState({ cameraOn: true }, () => {\n        const v = this.videoRef.current;\n        if (v) { v.srcObject = stream; v.play().catch(() => {}); }\n        this._lastHit = { code: '', t: 0 };\n        this._raf = requestAnimationFrame(() => this.scanLoop());\n      });\n    } catch (e) {\n      this.showToast('err', 'เปิดกล้องไม่ได้ — อนุญาตสิทธิ์กล้องแล้วลองใหม่', 3200);\n    }\n  }\n  stopCamera() {\n    cancelAnimationFrame(this._raf);\n    if (this._stream) { this._stream.getTracks().forEach(t => t.stop()); this._stream = null; }\n    if (this.videoRef.current) this.videoRef.current.srcObject = null;\n    if (this.state.cameraOn) this.setState({ cameraOn: false });\n  }\n  scanLoop() {\n    if (!this.state.cameraOn) return;\n    const v = this.videoRef.current, c = this.canvasRef.current;\n    // pause detection while a sheet is open and not in continuous mode\n    const paused = this.state.current && !this.state.continuous;\n    if (!paused && v && c && v.readyState >= 2 && window.jsQR) {\n      const w = v.videoWidth, h = v.videoHeight;\n      if (w && h) {\n        c.width = w; c.height = h;\n        const ctx = c.getContext('2d');\n        ctx.drawImage(v, 0, 0, w, h);\n        try {\n          const img = ctx.getImageData(0, 0, w, h);\n          const res = window.jsQR(img.data, w, h, { inversionAttempts: 'dontInvert' });\n          if (res && res.data) this.onDetected(res.data.trim());\n        } catch (e) {}\n      }\n    }\n    this._raf = requestAnimationFrame(() => this.scanLoop());\n  }\n  onDetected(raw) {\n    const now = Date.now();\n    if (this._lastHit && this._lastHit.code === raw && now - this._lastHit.t < 2500) return;\n    this._lastHit = { code: raw, t: now };\n    this.lookup(raw);\n  }\n\n  // ---------- lookup / detail ----------\n  lookup(raw) {\n    const asset = this.index ? this.index.get(this.norm(raw)) : null;\n    if (!asset) {\n      this.beep(false);\n      this.showToast('err', 'ไม่พบรหัส \"' + raw + '\" ในฐานข้อมูล', 2600);\n      this.pushRecent({ code: raw, found: false });\n      return;\n    }\n    const already = !!this.effStatus(asset.code);\n    this.beep(true);\n    if (already) this.showToast('info', 'รายการนี้ตรวจแล้ว — เปิดเพื่อแก้ไข', 1800);\n    this.openDetail(asset);\n    this.pushRecent({ code: asset.code, found: true });\n  }\n  openDetail(asset) {\n    const e = this.state.edits[this.norm(asset.code)] || {};\n    const draft = {\n      status: e.status || asset.status || '',\n      floor:  e.floor  != null && e.floor  !== '' ? e.floor : (asset.ak || this.normFloor(asset.srcFloor) || ''),\n      dept:   e.dept   != null && e.dept   !== '' ? e.dept  : (asset.al || asset.srcDept || ''),\n      room:   e.room   != null && e.room   !== '' ? e.room  : (asset.am || ''),\n    };\n    this.setState({ current: asset, draft });\n  }\n  closeDetail() { this.setState({ current: null, draft: null }); }\n\n  setDraftStatus(s) { this.setState({ draft: { ...this.state.draft, status: s } }); }\n  setDraft(field, val) { this.setState({ draft: { ...this.state.draft, [field]: val } }); }\n\n  saveCurrent() {\n    const cur = this.state.current, d = this.state.draft;\n    if (!cur || !d || !d.status) { this.showToast('err', 'เลือกสถานะก่อนบันทึก', 1800); return; }\n    const key = this.norm(cur.code);\n    const rec = {\n      code: cur.code, status: d.status,\n      floor: d.floor || '', dept: d.dept || '', room: d.room || '',\n      scannedAt: new Date().toISOString(), synced: false,\n    };\n    const edits = { ...this.state.edits, [key]: rec };\n    this.persistEdits(edits);\n    this.setState({ edits });\n    this.showToast('ok', 'บันทึกแล้ว: ' + (STATUS[d.status] ? STATUS[d.status].short : d.status));\n    this.pushSync([rec]);\n    if (this.state.continuous) this.closeDetail();\n    else this.closeDetail();\n  }\n\n  pushRecent(item) {\n    const stamp = new Date();\n    const time = stamp.getHours().toString().padStart(2, '0') + ':' + stamp.getMinutes().toString().padStart(2, '0');\n    const entry = { code: item.code, found: item.found, time, ts: stamp.getTime() };\n    const recent = [entry, ...this.state.recent.filter(r => !(r.code === item.code))].slice(0, 12);\n    this.persistRecent(recent);\n    this.setState({ recent });\n  }\n\n  // ---------- sync ----------\n  async pushSync(recs) {\n    const url = this.state.webhookUrl.trim();\n    if (!url) return;\n    try {\n      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ updates: recs.map(r => ({ code: r.code, status: r.status, floor: r.floor, dept: r.dept, room: r.room })) }) });\n      const data = await res.json();\n      if (data && data.ok) {\n        const edits = { ...this.state.edits };\n        recs.forEach(r => { if (edits[this.norm(r.code)]) edits[this.norm(r.code)].synced = true; });\n        this.persistEdits(edits); this.setState({ edits });\n        return true;\n      }\n    } catch (e) {}\n    return false;\n  }\n  async syncNow() {\n    const url = this.state.webhookUrl.trim();\n    if (!url) { this.setState({ view: 'settings' }); this.showToast('err', 'ยังไม่ได้ตั้งค่า Google Sheet', 2400); return; }\n    const pending = Object.values(this.state.edits).filter(e => !e.synced);\n    if (!pending.length) { this.showToast('info', 'ไม่มีรายการค้างซิงค์', 1800); return; }\n    this.setState({ syncing: true });\n    const ok = await this.pushSync(pending);\n    this.setState({ syncing: false });\n    this.showToast(ok ? 'ok' : 'err', ok ? 'ซิงค์สำเร็จ ' + pending.length + ' รายการ' : 'ซิงค์ไม่สำเร็จ ตรวจการเชื่อมต่อ', 2600);\n  }\n  setWebhook(v) { this.setState({ webhookUrl: v }); try { localStorage.setItem(LS_HOOK, v.trim()); } catch (e) {} }\n  async testConn() {\n    const url = this.state.webhookUrl.trim();\n    if (!url) { this.setState({ connMsg: { type: 'err', text: 'ใส่ Web App URL ก่อน' } }); return; }\n    this.setState({ connMsg: { type: 'info', text: 'กำลังทดสอบ…' } });\n    try {\n      const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'action=ping');\n      const data = await res.json();\n      if (data && data.ok) this.setState({ connMsg: { type: 'ok', text: '✓ เชื่อมต่อสำเร็จ — ชีต \"' + data.sheet + '\" ' + data.rows + ' แถว' } });\n      else this.setState({ connMsg: { type: 'err', text: 'ตอบกลับผิดพลาด: ' + (data.error || '?') } });\n    } catch (e) {\n      this.setState({ connMsg: { type: 'err', text: 'เชื่อมต่อไม่ได้ — ตรวจ URL และตั้ง Access = Anyone' } });\n    }\n  }\n\n  exportCsv() {\n    const rows = Object.values(this.state.edits);\n    if (!rows.length) { this.showToast('info', 'ยังไม่มีรายการที่ตรวจ', 1800); return; }\n    const head = ['รหัสครุภัณฑ์(B)', 'สติกเกอร์(AJ)', 'ชั้น(AK)', 'แผนก(AL)', 'ห้อง(AM)', 'เวลา'];\n    const esc = v => '\"' + String(v == null ? '' : v).replace(/\"/g, '\"\"') + '\"';\n    const lines = [head.map(esc).join(',')];\n    rows.forEach(r => lines.push([r.code, r.status, r.floor, r.dept, r.room, r.scannedAt].map(esc).join(',')));\n    const blob = new Blob(['\\uFEFF' + lines.join('\\r\\n')], { type: 'text/csv;charset=utf-8' });\n    const a = document.createElement('a');\n    a.href = URL.createObjectURL(blob);\n    a.download = 'ตรวจนับครุภัณฑ์_' + new Date().toISOString().slice(0, 10) + '.csv';\n    a.click();\n    setTimeout(() => URL.revokeObjectURL(a.href), 1000);\n  }\n  resetLocal() {\n    if (!confirm('ล้างผลการตรวจที่บันทึกในเครื่องนี้ทั้งหมด? (ข้อมูลที่ซิงค์ขึ้น Sheet แล้วจะไม่ถูกลบ)')) return;\n    this.persistEdits({}); this.setState({ edits: {} });\n    this.showToast('ok', 'ล้างข้อมูลในเครื่องแล้ว');\n  }\n\n  // ---------- render ----------\n  renderVals() {\n    const s = this.state;\n    const fmt = n => n.toLocaleString('en-US');\n    const ready = !s.loading;\n\n    // sync chip\n    const pending = Object.values(s.edits).filter(e => !e.synced).length;\n    const hasHook = !!s.webhookUrl.trim();\n    let syncChipLabel, syncDotColor, syncChipBg = '#eef1f5', syncChipColor = '#45556b';\n    if (s.syncing) { syncChipLabel = 'กำลังซิงค์…'; syncDotColor = '#f59e0b'; }\n    else if (!hasHook) { syncChipLabel = 'ยังไม่เชื่อม'; syncDotColor = '#c0392b'; syncChipBg = '#fde8e6'; syncChipColor = '#c0392b'; }\n    else if (pending) { syncChipLabel = 'ค้าง ' + pending; syncDotColor = '#f59e0b'; syncChipBg = '#fff3da'; syncChipColor = '#a06a00'; }\n    else { syncChipLabel = 'ซิงค์แล้ว'; syncDotColor = '#16a34a'; syncChipBg = '#dcfce7'; syncChipColor = '#15803d'; }\n\n    // nav\n    const nav = [['scan', 'สแกน', 'scan'], ['list', 'รายการ', 'list'], ['progress', 'สรุป', 'chart'], ['settings', 'ตั้งค่า', 'gear']];\n    const navItems = nav.map(([id, label, ic]) => ({\n      label, icon: { __html: ICONS[ic] }, color: s.view === id ? '#0e7c86' : '#9aa6b8',\n      onClick: () => { if (id !== 'scan' && s.cameraOn) this.stopCamera(); this.setState({ view: id }); },\n    }));\n\n    // ---- stats ----\n    const counts = { 'ติดแล้ว พื้นผิวปกติ': 0, 'ติดแล้ว พิ้นผิวโลหะ': 0, 'ไม่พบ': 0 };\n    let checked = 0;\n    for (const a of s.assets) {\n      const st = this.effStatus(a.code);\n      if (st) { checked++; if (counts[st] != null) counts[st]++; }\n    }\n    const total = s.assets.length;\n    const pct = total ? Math.round(checked / total * 100) : 0;\n    const statCards = [\n      { label: 'ปกติ', color: STATUS['ติดแล้ว พื้นผิวปกติ'].color, count: fmt(counts['ติดแล้ว พื้นผิวปกติ']) },\n      { label: 'โลหะ', color: STATUS['ติดแล้ว พิ้นผิวโลหะ'].color, count: fmt(counts['ติดแล้ว พิ้นผิวโลหะ']) },\n      { label: 'ไม่พบ', color: STATUS['ไม่พบ'].color, count: fmt(counts['ไม่พบ']) },\n      { label: 'ยังไม่ตรวจ', color: '#94a3b8', count: fmt(total - checked) },\n    ];\n\n    // floor progress (by srcFloor normalized)\n    const fp = new Map();\n    for (const a of s.assets) {\n      const fl = this.normFloor(a.srcFloor) || 'ไม่ระบุชั้น';\n      if (!fp.has(fl)) fp.set(fl, { total: 0, checked: 0 });\n      const o = fp.get(fl); o.total++; if (this.effStatus(a.code)) o.checked++;\n    }\n    const floorNum = f => { const m = String(f).match(/\\d+/); return m ? parseInt(m[0]) : (f.includes('ใต้ดิน') ? -1 : 999); };\n    const floorProgress = [...fp.entries()].map(([floor, o]) => ({\n      floor, total: fmt(o.total), checked: fmt(o.checked),\n      pct: o.total ? Math.round(o.checked / o.total * 100) : 0,\n      barColor: '#0e7c86',\n    })).sort((a, b) => floorNum(a.floor) - floorNum(b.floor));\n\n    // ---- list ----\n    const term = s.searchTerm.trim().toUpperCase();\n    let filtered = s.assets;\n    if (term) filtered = filtered.filter(a => this.norm(a.code).includes(term) || (a.name || '').toUpperCase().includes(term));\n    if (s.filterFloor) filtered = filtered.filter(a => this.normFloor(a.srcFloor) === s.filterFloor);\n    if (s.filterStatus !== 'all') {\n      filtered = filtered.filter(a => {\n        const st = this.effStatus(a.code);\n        if (s.filterStatus === 'unchecked') return !st;\n        if (s.filterStatus === 'checked') return !!st && st !== 'ไม่พบ';\n        if (s.filterStatus === 'notfound') return st === 'ไม่พบ';\n        return true;\n      });\n    }\n    const listTotal = filtered.length;\n    const visibleList = filtered.slice(0, s.listLimit).map(a => {\n      const st = this.effStatus(a.code);\n      const meta = st ? (STATUS[st] || { bg: '#eef1f5', color: '#6b7688', short: st }) : null;\n      return {\n        code: a.code, name: a.name || '—',\n        srcLabel: [a.srcFloor, a.srcDept].filter(Boolean).join(' · ') || '—',\n        badge: meta ? meta.short : 'ยังไม่ตรวจ',\n        badgeBg: meta ? meta.bg : '#eef1f5',\n        badgeColor: meta ? meta.color : '#94a3b8',\n        onOpen: () => this.openDetail(a),\n      };\n    });\n    const statusFilterDefs = [['all', 'ทั้งหมด'], ['unchecked', 'ยังไม่ตรวจ'], ['checked', 'ตรวจแล้ว'], ['notfound', 'ไม่พบ']];\n    const statusFilters = statusFilterDefs.map(([id, label]) => {\n      const active = s.filterStatus === id;\n      return { label, onClick: () => this.setState({ filterStatus: id, listLimit: 50 }),\n        bg: active ? '#0e7c86' : '#fff', color: active ? '#fff' : '#5a6678', border: active ? '#0e7c86' : '#dde3ec' };\n    });\n    const floorFilterOpts = [...new Set(s.assets.map(a => this.normFloor(a.srcFloor)).filter(Boolean))]\n      .sort((a, b) => floorNum(a) - floorNum(b));\n\n    // recent\n    const recentScans = s.recent.map(r => {\n      const a = this.index ? this.index.get(this.norm(r.code)) : null;\n      const st = r.found ? this.effStatus(r.code) : '';\n      const meta = st ? STATUS[st] : null;\n      return {\n        code: r.code, time: r.time,\n        label: !r.found ? 'ไม่พบในฐานข้อมูล' : (a ? (a.name || '—') : '—'),\n        dotColor: !r.found ? '#dc2626' : (meta ? meta.color : '#94a3b8'),\n        onOpen: () => { if (a) this.openDetail(a); else this.showToast('err', 'ไม่พบรหัสนี้', 1800); },\n      };\n    });\n\n    // ---- detail ----\n    const cur = s.current;\n    const d = s.draft || {};\n    let detailFields = [], statusOptions = [], curAlreadyChecked = false, curPrevStatus = '', curPrevBg = '', curPrevColor = '';\n    let saveBtnBg = '#0e7c86', saveBtnLabel = 'บันทึกผลการตรวจ', saveBtnOpacity = 1;\n    if (cur) {\n      const f = [\n        ['รหัสครุภัณฑ์', cur.code], ['ชื่อทรัพย์สิน', cur.name], ['หมายเหตุ', cur.note],\n        ['ที่ตั้งเดิม', cur.origLoc], ['New! Location', cur.placeLoc], ['ประเภทงาน', cur.workType],\n      ];\n      detailFields = f.map((x, i) => ({ label: x[0], value: x[1] && String(x[1]).trim() ? x[1] : '—', border: i === f.length - 1 ? 'transparent' : '#f0f2f5' }));\n      statusOptions = STATUS_ORDER.map(st => {\n        const m = STATUS[st]; const sel = d.status === st;\n        return { label: st, onClick: () => this.setDraftStatus(st),\n          border: sel ? m.color : '#e7ebf1', bg: sel ? m.bg : '#fff',\n          dot: sel ? m.color : '#c3cad6', dotFill: '#fff', innerDot: sel ? m.color : 'transparent',\n          textColor: sel ? m.color : '#3a4658' };\n      });\n      const prevStored = this.state.edits[this.norm(cur.code)];\n      const prev = (prevStored && prevStored.status) || cur.status;\n      if (prev) { curAlreadyChecked = true; curPrevStatus = prev; const pm = STATUS[prev] || {}; curPrevBg = pm.bg || '#fff3da'; curPrevColor = pm.color || '#a06a00'; }\n      if (!d.status) { saveBtnBg = '#c3cad6'; saveBtnOpacity = .7; saveBtnLabel = 'เลือกสถานะก่อนบันทึก'; }\n      else { saveBtnLabel = 'บันทึก: ' + (STATUS[d.status] ? STATUS[d.status].short : d.status); }\n    }\n\n    // toast\n    const t = s.toast;\n    const toastBg = t ? (t.type === 'ok' ? '#16a34a' : t.type === 'err' ? '#dc2626' : '#334155') : '#334155';\n    const toastIcon = t ? (t.type === 'ok' ? '✓' : t.type === 'err' ? '!' : 'ⓘ') : '';\n\n    // conn msg\n    const cm = s.connMsg;\n    const connMsgBg = cm ? (cm.type === 'ok' ? '#dcfce7' : cm.type === 'err' ? '#fee2e2' : '#e8eef5') : '';\n    const connMsgColor = cm ? (cm.type === 'ok' ? '#15803d' : cm.type === 'err' ? '#c0392b' : '#3a4658') : '';\n\n    return {\n      loading: s.loading, ready,\n      isScan: ready && s.view === 'scan', isList: ready && s.view === 'list',\n      isProgress: ready && s.view === 'progress', isSettings: ready && s.view === 'settings',\n      navItems,\n      // sync chip\n      syncChipLabel, syncDotColor, syncChipBg, syncChipColor,\n      onSyncNow: () => this.syncNow(),\n      // camera\n      videoRef: this.videoRef, canvasRef: this.canvasRef,\n      cameraOn: s.cameraOn, cameraOff: !s.cameraOn,\n      videoDisplay: s.cameraOn ? 'block' : 'none',\n      camBtnLabel: s.cameraOn ? 'หยุดกล้อง' : 'เปิดกล้องสแกน',\n      camBtnBg: s.cameraOn ? '#c0392b' : '#0e7c86',\n      onToggleCamera: () => this.toggleCamera(),\n      continuous: s.continuous, onToggleContinuous: () => this.setState({ continuous: !s.continuous }),\n      contColor: s.continuous ? '#0e7c86' : '#8a96a8', contBg: s.continuous ? '#e6f5f4' : '#fff',\n      contBorder: s.continuous ? '#0e7c86' : '#dde3ec', contFill: s.continuous ? '#0e7c86' : 'transparent',\n      // manual\n      manualCode: s.manualCode, onManualChange: e => this.setState({ manualCode: e.target.value }),\n      onManualSubmit: e => { e.preventDefault(); const v = s.manualCode.trim(); if (v) { this.lookup(v); this.setState({ manualCode: '' }); } },\n      // recent\n      recentScans, hasRecent: recentScans.length > 0, noRecent: recentScans.length === 0,\n      onClearRecent: () => { this.persistRecent([]); this.setState({ recent: [] }); },\n      // list\n      searchTerm: s.searchTerm, onSearchChange: e => this.setState({ searchTerm: e.target.value, listLimit: 50 }),\n      statusFilters, filterFloor: s.filterFloor, floorFilterOpts,\n      onFloorFilterChange: e => this.setState({ filterFloor: e.target.value, listLimit: 50 }),\n      visibleList, listCountLabel: fmt(listTotal),\n      canLoadMore: listTotal > s.listLimit, listEmpty: listTotal === 0,\n      onLoadMore: () => this.setState({ listLimit: s.listLimit + 50 }),\n      // progress\n      pct, checkedLabel: fmt(checked), totalLabel: fmt(total), statCards, floorProgress,\n      // detail\n      hasCurrent: !!cur, cur: cur || {}, detailFields, statusOptions,\n      curAlreadyChecked, curPrevStatus, curPrevBg, curPrevColor,\n      draftFloor: d.floor || '', draftDept: d.dept || '', draftRoom: d.room || '',\n      onDraftFloor: e => this.setDraft('floor', e.target.value),\n      onDraftDept: e => this.setDraft('dept', e.target.value),\n      onDraftRoom: e => this.setDraft('room', e.target.value),\n      onSaveCurrent: () => this.saveCurrent(), onCloseDetail: () => this.closeDetail(),\n      saveBtnBg, saveBtnLabel, saveBtnOpacity, stopProp: e => e.stopPropagation(),\n      floorOpts: s.options.floors, deptOpts: s.options.depts, roomOpts: s.options.rooms,\n      // settings\n      webhookUrl: s.webhookUrl, onWebhookChange: e => this.setWebhook(e.target.value),\n      onTestConn: () => this.testConn(), pendingCount: pending,\n      hasConnMsg: !!cm, connMsg: cm ? cm.text : '', connMsgBg, connMsgColor,\n      onExport: () => this.exportCsv(), onResetLocal: () => this.resetLocal(),\n      localEditLabel: fmt(Object.keys(s.edits).length),\n      // toast\n      hasToast: !!t, toastMsg: t ? t.text : '', toastBg, toastIcon,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
