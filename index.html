document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    try { console.warn('[bundle] ' + (e.message || e.type)); } catch (_) {}
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ustify-content: center;\">\n            <video ref=\"{{ videoRef }}\" playsinline=\"\" muted=\"\" style=\"width: 100%; height: 100%; object-fit: cover; display: {{ videoDisplay }};\"><\u002Fvideo>\n            <canvas ref=\"{{ canvasRef }}\" style=\"display: none;\"><\u002Fcanvas>\n\n            <sc-if value=\"{{ cameraOff }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: #8b97ab; padding: 24px; text-align: center;\">\n                <svg width=\"46\" height=\"46\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5d6b80\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"6\" width=\"20\" height=\"14\" rx=\"3\"><\u002Frect><circle cx=\"12\" cy=\"13\" r=\"4\"><\u002Fcircle><path d=\"M8 6l1.5-2.5h5L16 6\"><\u002Fpath><\u002Fsvg>\n                <div style=\"font-size: 13px; line-height: 1.5;\">กดเปิดกล้องเพื่อเริ่มสแกน QR Code<br>บนสติกเกอร์ครุภัณฑ์<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ cameraOn }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position: absolute; inset: 0; pointer-events: none;\">\n                <div style=\"position: absolute; inset: 16%; border-radius: 16px; box-shadow: 0 0 0 3000px rgba(11,18,32,.32);\"><\u002Fdiv>\n                <div style=\"position: absolute; left: 16%; top: 16%; width: 30px; height: 30px; border-top: 3px solid #19d3c5; border-left: 3px solid #19d3c5; border-top-left-radius: 12px;\"><\u002Fdiv>\n                <div style=\"position: absolute; right: 16%; top: 16%; width: 30px; height: 30px; border-top: 3px solid #19d3c5; border-right: 3px solid #19d3c5; border-top-right-radius: 12px;\"><\u002Fdiv>\n                <div style=\"position: absolute; left: 16%; bottom: 16%; width: 30px; height: 30px; border-bottom: 3px solid #19d3c5; border-left: 3px solid #19 600; font-size: 13px;\">ล้างข้อมูลที่บันทึกในเครื่อง<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fmain>\n\n    <!-- ===== Bottom Nav ===== -->\n    <nav style=\"position: sticky; bottom: 0; z-index: 30; background: rgba(255,255,255,.94); backdrop-filter: blur(10px); border-top: 1px solid #e7ebf1; display: grid; grid-template-columns: repeat(4, 1fr); padding: 7px 6px calc(7px + env(safe-area-inset-bottom));\">\n      <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ n.onClick }}\" style=\"display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; color: {{ n.color }};\">\n          <span style=\"position: relative;\" dangerouslysetinnerhtml=\"{{ n.icon }}\"><\u002Fspan>\n          <span style=\"font-size: 10.5px; font-weight: 600;\">{{ n.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <!-- ===== Detail Bottom Sheet ===== -->\n    <sc-if value=\"{{ hasCurrent }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ onCloseDetail }}\" style=\"position: fixed; inset: 0; z-index: 50; background: rgba(13,20,33,.45); display: flex; align-items: flex-end; justify-content: center; animation: fade .2s;\">\n        <div onclick=\"{{ stopProp }}\" style=\"width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; background: #f6f7f9; border-radius: 22px 22px 0 0; animation: sheetUp .28s cubic-bezier(.2,.8,.2,1);\">\n          <div style=\"position: sticky; top: 0; background: #f6f7f9; padding: 12px 18px 8px; z-index: 2;\">\n            <div style=\"width: 40px; height: 5px; border-radius: 999px; background: #d3dae4; margin: 0 auto 12px;\"><\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <div style=\"flex: 1; min-width: 0;\">\n                <div class=\"mono\" style=\"font-size: 17px; font-weig           <div style=\"display: flex; align-items: center; gap: 8px; margin: 2px 2px 10px; color: #0e7c86; font-size: 12px; font-weight: 600;\">\n                <span style=\"width: 13px; height: 13px; border: 2px solid #bfe0df; border-top-color: #0e7c86; border-radius: 50%; animation: spin .7s linear infinite;\"><\u002Fspan>\n                กำลังดึงข้อมูลล่าสุดจาก Google Sheet…\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <!-- detail fields -->\n            <div style=\"background: #fff; border: 1px solid #e7ebf1; border-radius: 14px; padding: 4px 14px;\">\n              <sc-for list=\"{{ detailFields }}\" as=\"d\" hint-placeholder-count=\"4\">\n                <div style=\"display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid {{ d.border }};\">\n                  <span style=\"flex-shrink: 0; width: 92px; font-size: 12.5px; color: #95a1b3; font-weight: 500;\">{{ d.label }}<\u002Fspan>\n                  <span style=\"flex: 1; font-size: 13.5px; color: #2a3546; font-weight: 500; word-break: break-word;\">{{ d.value }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- status buttons -->\n            <div style=\"margin-top: 16px; font-size: 13px; font-weight: 700; color: #3a4658;\">อัปเดตสถานะสติกเกอร์<\u002Fdiv>\n            <div style=\"margin-top: 9px; display: flex; flex-direction: column; gap: 8px;\">\n              <sc-for list=\"{{ statusOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ o.onClick }}\" style=\"display: flex; align-items: center; gap: 11px; padding: 13px 14px; border-radius: 13px; border: 2px solid {{ o.border }}; background: {{ o.bg }}; text-align: left;\">\n                  <span style=\"width: 22px; height: 22px; border-radius: 50%; border: 2px solid {{ o.dot }}; background: {{ o.dotFill }}; flex-shrink: 0; display: flex; align-items: center; justify-content: center;\">\n                    <span style=\"width: 9px; height: 9px; border-radius: 50%; background: {{ o.innerDot }};\"><\u002Fspan>\n                  <\u002Fspan>\n                  <span style=\"font-size: 14px; font-weight: 600; color: {{ o.textColor }};\">{{ o.label }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- location -->\n            <div style=\"margin-top: 16px; font-size: 13px; font-weight: 700; color: #3a4658;\">อัปเดตที่ตั้ง<\u002Fdiv>\n            <div style=\"margin-top: 9px; background: #fff; border: 1px solid #e7ebf1; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 11px;\">\n              <label style=\"display: block;\">\n                <span style=\"font-size: 12px; color: #8a96a8; font-weight: 500;\">ชั้น (AK)<\u002Fspan>\n                <input value=\"{{ draftFloor }}\" onchange=\"{{ onDraftFloor }}\" list=\"dl-floors\" placeholder=\"เลือกหรือพิมพ์\" style=\"width: 100%; margin-top: 5px; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #dde3ec; font-size: 14px; background: #f8fafc;\">\n              <\u002Flabel>\n              <label style=\"display: block;\">\n                <span style=\"font-size: 12px; color: #8a96a8; font-weight: 500;\">แผนก (AL)<\u002Fspan>\n                <input value=\"{{ draftDept }}\" onchange=\"{{ onDraftDept }}\" list=\"dl-depts\" placeholder=\"เลือกหรือพิมพ์\" style=\"width: 100%; margin-top: 5px; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #dde3ec; font-size: 14px; background: #f8fafc;\">\n              <\u002Flabel>\n              <label style=\"display: block;\">\n                <span style=\"font-size: 12px; color: #8a96a8; font-weight: 500;\">ห้อง (AM)<\u002Fspan>\n                <input value=\"{{ draftRoom }}\" onchange=\"{{ onDraftRoom }}\" list=\"dl-rooms\" placeholder=\"เลือกหรือพิมพ์\" style=\"width: 100%; margin-top: 5px; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #dde3ec; font-size: 14px; background: #f8fafc;\">\n              <\u002Flabel>\n            <\u002Fdiv>\n\n            <div style=\"height: 16px;\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- save bar -->\n          <div style=\"position: sticky; bottom: 0; background: linear-gradient(180deg, rgba(246,247,249,0), #f6f7f9 28%); padding: 14px 18px calc(16px + env(safe-area-inset-bottom));\">\n            <button onclick=\"{{ onSaveCurrent }}\" style=\"width: 100%; padding: 15px; border-radius: 14px; font-size: 15px; font-weight: 700; color: #fff; background: {{ saveBtnBg }}; opacity: {{ saveBtnOpacity }};\">{{ saveBtnLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- datalists -->\n    <datalist id=\"dl-floors\"><sc-for list=\"{{ floorOpts }}\" as=\"o\" hint-placeholder-count=\"0\"><option value=\"{{ o }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist>\n    <datalist id=\"dl-depts\"><sc-for list=\"{{ deptOpts }}\" as=\"o\" hint-placeholder-count=\"0\"><option value=\"{{ o }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist>\n    <datalist id=\"dl-rooms\"><sc-for list=\"{{ roomOpts }}\" as=\"o\" hint-placeholder-count=\"0\"><option value=\"{{ o }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist>\n\n    <!-- toast -->\n    <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: fixed; left: 50%; bottom: 88px; transform: translateX(-50%); z-index: 80; max-width: 92%; background: {{ toastBg }}; color: #fff; padding: 12px 18px; border-radius: 13px; font-size: 13.5px; font-weight: 600; box-shadow: 0 10px 30px rgba(13,20,33,.28); display: flex; align-items: center; gap: 9px; animation: pop .25s;\">\n        <span style=\"font-size: 16px;\">{{ toastIcon }}<\u002Fspan>{{ toastMsg }}\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst STATUS = {\n  'ติดแล้ว พื้นผิวปกติ': { color: '#16a34a', bg: '#dcfce7', short: 'ปกติ' },\n  'ติดแล้ว พิ้นผิวโลหะ': { color: '#2563eb', bg: '#dbeafe', short: 'โลหะ' },\n  'ไม่พบ':              { color: '#dc2626', bg: '#fee2e2', short: 'ไม่พบ' },\n};\nconst STATUS_ORDER = ['ติดแล้ว พื้นผิวปกติ', 'ติดแล้ว พิ้นผิวโลหะ', 'ไม่พบ'];\nconst LS_EDITS = 'qrinv.edits.v1';\nconst LS_HOOK  = 'qrinv.webhook.v1';\nconst LS_RECENT = 'qrinv.recent.v1';\nconst LS_IMGBASE = 'qrinv.imgbase.v1';\nconst LS_REMOTE = 'qrinv.remote.v1';\nconst IMG_EXTS = ['.jpg', '.jpeg', '.png'];\n\nconst ICONS = {\n  scan: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 7V5a1 1 0 0 1 1-1h2M20 7V5a1 1 0 0 0-1-1h-2M4 17v2a1 1 0 0 0 1 1h2M20 17v2a1 1 0 0 1-1 1h-2M3 12h18\"/><\u002Fsvg>',\n  list: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01\"/><\u002Fsvg>',\n  chart: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"/><rect x=\"7\" y=\"11\" width=\"3\" height=\"6\"/><rect x=\"13\" y=\"7\" width=\"3\" height=\"10\"/><\u002Fsvg>',\n  gear: '<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"/><path d=\"M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1\"/><\u002Fsvg>',\n};\n\nclass Component extends DCLogic {\n  videoRef = React.createRef();\n  canvasRef = React.createRef();\n  manualRef = React.createRef();\n\n  state = {\n    loading: true,\n    assets: [],\n    options: { floors: [], depts: [], rooms: [] },\n    edits: {},\n    view: 'scan',\n    cameraOn: false,\n    continuous: false,\n    manualCode: '',\n    recent: [],\n    current: null,       // asset object\n    draft: null,         // { status, floor, dept, room }\n    liveData: {},        // ค่าจริงจาก Sheet (XLOOKUP) cache by code\n    remote: {},          // สถานะ/ที่ตั้งล่าสุดจาก Sheet (ดึงแบบ bulk) by code\n    liveLoading: false,\n    imgBase: 'images/',  // โฟลเดอร์รูป\n    imgUrl: '',          // URL รูปที่ยืนยันแล้วว่ามีจริง\n    imgStatus: 'idle',   // idle | loading | ok | none\n    searchTerm: '',\n    filterStatus: 'all',\n    filterFloor: '',\n    listLimit: 50,\n    webhookUrl: '',\n    connMsg: null,       // { type:'ok'|'err'|'info', text }\n    syncing: false,\n    toast: null,\n  };\n\n  // ---------- lifecycle ----------\n  componentDidMount() {\n    try { this.setState({ edits: JSON.parse(localStorage.getItem(LS_EDITS) || '{}') }); } catch (e) {}\n    try { this.setState({ webhookUrl: localStorage.getItem(LS_HOOK) || '' }); } catch (e) {}\n    try { this.setState({ recent: JSON.parse(localStorage.getItem(LS_RECENT) || '[]') }); } catch (e) {}\n    try { const ib = localStorage.getItem(LS_IMGBASE); if (ib != null) this.setState({ imgBase: ib }); } catch (e) {}\n    try { this.setState({ remote: JSON.parse(localStorage.getItem(LS_REMOTE) || '{}') }); } catch (e) {}\n    this.loadData();\n  }\n  componentWillUnmount() { this.stopCamera(); }\n\n  async loadData() {\n    const embedded = () => (window.__ASSETS__ && window.__OPTIONS__)\n      ? { a: window.__ASSETS__, o: window.__OPTIONS__ } : null;\n    try {\n      let emb = embedded();\n      if (!emb) {\n        // โหมดพัฒนา: ลองโหลดจากโฟลเดอร์ data/ ก่อน\n        try {\n          const r = await fetch('data/assets.json');\n          if (r.ok) {\n            const a = await r.json();\n            const o = await fetch('data/options.json').then(x => x.json());\n            return this.applyData(a, o);\n          }\n        } catch (e) {}\n        // ไฟล์เดียวแบบ standalone: ข้อมูลฝัง (embedded.js) โหลดแบบ async — รอจนพร้อม\n        for (let i = 0; i < 240 && !embedded(); i++) await new Promise(res => setTimeout(res, 75));\n        emb = embedded();\n      }\n      if (emb) this.applyData(emb.a, emb.o);\n      else this.setState({ loading: false, toast: { type: 'err', text: 'โหลดข้อมูลไม่สำเร็จ' } });\n    } catch (e) {\n      this.setState({ loading: false, toast: { type: 'err', text: 'โหลดข้อมูลไม่สำเร็จ' } });\n    }\n  }\n  applyData(a, o) {\n    this.index = new Map();\n    this.indexStripped = new Map();   // คีย์แบบตัดขีด/ช่องว่าง สำหรับค้นแบบยืดหยุ่น\n    for (const it of a) {\n      this.index.set(this.norm(it.code), it);\n      const sk = this.stripKey(it.code);\n      if (sk && !this.indexStripped.has(sk)) this.indexStripped.set(sk, it);\n    }\n    this.setState({ assets: a, options: o, loading: false });\n    this.focusSearch();\n    if (this.state.webhookUrl.trim()) this.pullFromSheet(true);   // ดึงสถานะล่าสุดจาก Sheet อัตโนมัติ\n  }\n  focusSearch() {   // เคอร์เซอร์ไปที่ช่องกรอกรหัสเสมอ (เหมาะกับเครื่องยิงบาร์โค้ด)\n    setTimeout(() => {\n      const el = this.manualRef.current;\n      if (el && this.state.view === 'scan' && !this.state.current) el.focus();\n    }, 80);\n  }\n\n  // ---------- helpers ----------\n  norm(s) { return String(s == null ? '' : s).trim().toUpperCase(); }\n  stripKey(s) { return String(s == null ? '' : s).toUpperCase().replace(/[^0-9A-Z]/g, ''); }  // เหลือแต่ตัวเลข+ตัวอักษร\n  findAsset(raw) {\n    if (!this.index) return null;\n    let s = String(raw == null ? '' : raw).trim();\n    if (!s) return null;\n    // 1) ตรงเป๊ะ\n    let hit = this.index.get(this.norm(s));\n    if (hit) return hit;\n    // 2) ถ้าเป็น URL/ข้อความยาว ลองดึงรหัสรูปแบบ 99-9999999999-9999 ออกมา\n    const m = s.match(/\\d{2}-\\d{9,11}-\\d{3,5}(?:\\/\\d+)?/);\n    if (m) { hit = this.index.get(this.norm(m[0])); if (hit) return hit; }\n    // 3) ตัดขีด/ช่องว่าง/อักขระอื่นทิ้งแล้วเทียบ\n    const sk = this.stripKey(m ? m[0] : s);\n    if (sk) { hit = this.indexStripped.get(sk); if (hit) return hit; }\n    // 4) ตัวเลขล้วน — เทียบกับรหัสที่ตัดอักขระแล้ว (เผื่อ QR เก็บเฉพาะตัวเลข)\n    const digits = s.replace(/\\D/g, '');\n    if (digits.length >= 12) { hit = this.indexStripped.get(digits); if (hit) return hit; }\n    return null;\n  }\n  clean(v) {   // ตัดค่า error จากสูตรใน Sheet (#NAME? #REF! ฯลฯ) ออก\n    const s = String(v == null ? '' : v).trim();\n    if (/^#(NAME\\?|REF!|VALUE!|N\\/A|DIV\\/0!|NULL!|NUM!|ERROR!|CALC!|SPILL!|GETTING_DATA)$/i.test(s)) return '';\n    return s;\n  }\n  normFloor(s) {\n    s = this.clean(s);\n    const m = s.match(/^(\\d+)$/);\n    if (m) return 'ชั้น ' + m[1];\n    return s;\n  }\n  imgCodeFor(name) {   // ดึงรหัสกลุ่มรูปจากต้นชื่อทรัพย์สิน เช่น \"PCH-14 STAFF LOUNGE\" → \"PCH-14\"\n    const m = this.clean(name).match(/^([A-Z]{1,5}-\\d+[A-Z]?)\\b/);\n    return m ? m[1] : '';\n  }\n  persistEdits(edits) { try { localStorage.setItem(LS_EDITS, JSON.stringify(edits)); } catch (e) {} }\n  persistRecent(recent) { try { localStorage.setItem(LS_RECENT, JSON.stringify(recent)); } catch (e) {} }\n  effStatus(code) {\n    const k = this.norm(code);\n    const e = this.state.edits[k]; if (e && e.status) return e.status;\n    const r = this.state.remote[k]; if (r && r.status) return this.clean(r.status);\n    const a = this.index && this.index.get(k); return a ? a.status : '';\n  }\n  async pullFromSheet(silent) {\n    const url = this.state.webhookUrl.trim();\n    if (!url) { if (!silent) { this.setState({ view: 'settings' }); this.showToast('err', 'ยังไม่ได้ตั้งค่า Google Sheet', 2400); } return; }\n    if (!silent) this.setState({ syncing: true });\n    try {\n      const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'action=pull');\n      const data = await res.json();\n      if (data && data.ok && Array.isArray(data.rows)) {\n        const remote = {};\n        for (const r of data.rows) {\n          const st = (r.status || '').trim(), fl = (r.floor || '').trim(), dp = (r.dept || '').trim(), rm = (r.room || '').trim();\n          if (st || fl || dp || rm) remote[this.norm(r.code)] = { status: st, floor: fl, dept: dp, room: rm };\n        }\n        this.setState({ remote });\n        try { localStorage.setItem(LS_REMOTE, JSON.stringify(remote)); } catch (e) {}\n        if (!silent) this.showToast('ok', 'ดึงข้อมูลล่าสุดจาก Sheet แล้ว (' + Object.keys(remote).length + ' รายการที่ตรวจ)', 2600);\n      } else if (!silent) this.showToast('err', 'ดึงข้อมูลไม่สำเร็จ', 2400);\n    } catch (e) { if (!silent) this.showToast('err', 'ดึงข้อมูลไม่สำเร็จ — ตรวจการเชื่อมต่อ', 2400); }\n    if (!silent) this.setState({ syncing: false });\n  }\n  beep(ok) {\n    try {\n      const ac = this._ac || (this._ac = new (window.AudioContext || window.webkitAudioContext)());\n      const o = ac.createOscillator(), g = ac.createGain();\n      o.connect(g); g.connect(ac.destination);\n      o.frequency.value = ok ? 880 : 280;\n      g.gain.setValueAtTime(0.0001, ac.currentTime);\n      g.gain.exponentialRampToValueAtTime(0.25, ac.currentTime + 0.01);\n      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.18);\n      o.start(); o.stop(ac.currentTime + 0.2);\n    } catch (e) {}\n  }\n  showToast(type, text, ms) {\n    this.setState({ toast: { type, text } });\n    clearTimeout(this._toastT);\n    this._toastT = setTimeout(() => this.setState({ toast: null }), ms || 2200);\n  }\n\n  // ---------- camera ----------\n  async toggleCamera() { if (this.state.cameraOn) this.stopCamera(); else await this.startCamera(); }\n  async startCamera() {\n    try {\n      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });\n      this._stream = stream;\n      this.setState({ cameraOn: true }, () => {\n        const v = this.videoRef.current;\n        if (v) { v.srcObject = stream; v.play().catch(() => {}); }\n        this._lastHit = { code: '', t: 0 };\n        this._raf = requestAnimationFrame(() => this. pending.length) { this.showToast('info', 'ไม่มีรายการค้างซิงค์', 1800); return; }\n    this.setState({ syncing: true });\n    const ok = await this.pushSync(pending);\n    this.setState({ syncing: false });\n    this.showToast(ok ? 'ok' : 'err', ok ? 'ซิงค์สำเร็จ ' + pending.length + ' รายการ' : 'ซิงค์ไม่สำเร็จ ตรวจการเชื่อมต่อ', 2600);\n  }\n  setWebhook(v) { this.setState({ webhookUrl: v }); try { localStorage.setItem(LS_HOOK, v.trim()); } catch (e) {} }\n  async testConn() {\n    const url = this.state.webhookUrl.trim();\n    if (!url) { this.setState({ connMsg: { type: 'err', text: 'ใส่ Web App URL ก่อน' } }); return; }\n    this.setState({ connMsg: { type: 'info', text: 'กำลังทดสอบ…' } });\n    try {\n      const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'action=ping');\n      const data = await res.json();\n      if (data && data.ok) this.setState({ connMsg: { type: 'ok', text: '✓ เชื่อมต่อสำเร็จ — ชีต \"' + data.sheet + '\" ' + data.rows + ' แถว' } });\n      else this.setState({ connMsg: { type: 'err', text: 'ตอบกลับผิดพลาด: ' + (data.error || '?') } });\n    } catch (e) {\n      this.setState({ connMsg: { type: 'err', text: 'เชื่อมต่อไม่ได้ — ตรวจ URL และตั้ง Access = Anyone' } });\n    }\n  }\n\n  exportCsv() {\n    const rows = Object.values(this.state.edits);\n    if (!rows.length) { this.showToast('info', 'ยังไม่มีรายการที่ตรวจ', 1800); return; }\n    const head = ['รหัสครุภัณฑ์(B)', 'สติกเกอร์(AJ)', 'ชั้น(AK)', 'แผนก(AL)', 'ห้อง(AM)', 'เวลา'];\n    const esc = v => '\"' + String(v == null ? '' : v).replace(/\"/g, '\"\"') + '\"';\n    const lines = [head.map(esc).join(',')];\n    rows.forEach(r => lines.push([r.code, r.status, r.floor, r.dept, r.room, r.scannedAt].map(esc).join(',')));\n    const blob = new Blob(['\\uFEFF' + lines.join('\\r\\n')], { type: 'text/csv;charset=utf-8' });\n    const a = document.createElement('a');\n    a.href = URL.createObjectURL(blob);\n    a.download = 'ตรวจนับครุภัณฑ์_' + new Date().toISOString().slice(0, 10) + '.csv';\n    a.click();\n    setTimeout(() => URL.revokeObjectURL(a.href), 1000);\n  }\n  resetLocal() {\n    if (!confirm('ล้างผลการตรวจที่บันทึกในเครื่องนี้ทั้งหมด? (ข้อมูลที่ซิงค์ขึ้น Sheet แล้วจะไม่ถูกลบ)')) return;\n    this.persistEdits({}); this.setState({ edits: {} });\n    this.showToast('ok', 'ล้างข้อมูลในเครื่องแล้ว');\n  }\n\n  // ---------- render ----------\n  renderVals() {\n    const s = this.state;\n    const fmt = n => n.toLocaleString('en-US');\n    const ready = !s.loading;\n\n    // sync chip\n    const pending = Object.values(s.edits).filter(e => !e.synced).length;\n    const hasHook = !!s.webhookUrl.trim();\n    let syncChipLabel, syncDotColor, syncChipBg = '#eef1f5', syncChipColor = '#45556b';\n    if (s.syncing) { syncChipLabel = 'กำลังซิงค์…'; syncDotColor = '#f59e0b'; }\n    else if (!hasHook) { syncChipLabel = 'ยังไม่เชื่อม'; syncDotColor = '#c0392b'; syncChipBg = '#fde8e6'; syncChipColor = '#c0392b'; }\n    else if (pending) { syncChipLabel = 'ค้าง ' + pending; syncDotColor = '#f59e0b'; syncChipBg = '#fff3da'; syncChipColor = '#a06a00'; }\n    else { syncChipLabel = 'ซิงค์แล้ว'; syncDotColor = '#16a34a'; syncChipBg = '#dcfce7'; syncChipColor = '#15803d'; }\n\n    // nav\n    const nav = [['scan', 'สแกน', 'scan'], ['list', 'รายการ', 'list'], ['progress', 'สรุป', 'chart'], ['settings', 'ตั้งค่า', 'gear']];\n    const navItems = nav.map(([id, label, ic]) => ({\n      label, icon: { __html: ICONS[ic] }, color: s.view === id ? '#0e7c86' : '#9aa6b8',\n      onClick: () => { if (id !== 'scan' && s.cameraOn) this.stopCamera(); this.setState({ view: id }); if (id === 'scan') this.focusSearch(); },\n    }));\n\n    // ---- stats ----\n    const counts = { 'ติดแล้ว พื้นผิวปกติ': 0, 'ติดแล้ว พิ้นผิวโลหะ': 0, 'ไม่พบ': 0 };\n    let checked = 0;\n    for (const a of s.assets) {\n      const st = this.effStatus(a.code);\n      if (st) { checked++; if (counts[st] != null) counts[st]++; }\n    }\n    const total = s.assets.length;\n    const pct = total ? Math.round(checked / total * 100) : 0;\n    const statCards = [\n      { label: 'ปกติ', color: STATUS['ติดแล้ว พื้นผิวปกติ'].color, count: fmt(counts['ติดแล้ว พื้นผิวปกติ']) },\n      { label: 'โลหะ', color: STATUS['ติดแล้ว พิ้นผิวโลหะ'].color, count: fmt(counts['ติดแล้ว พิ้นผิวโลหะ']) },\n      { label: 'ไม่พบ', color: STATUS['ไม่พบ'].color, count: fmt(counts['ไม่พบ']) },\n      { label: 'ยังไม่ตรวจ', color: '#94a3b8', count: fmt(total - checked) },\n    ];\n\n    // floor progress (by srcFloor normalized)\n    const fp = new Map();\n    for (const a of s.assets) {\n      const fl = this.normFloor(a.srcFloor) || 'ไม่ระบุชั้น';\n      if (!fp.has(fl)) fp.set(fl, { total: 0, checked: 0 });\n      const o = fp.get(fl); o.total++; if (this.effStatus(a.code)) o.checked++;\n    }\n    const floorNum = f => { const m = String(f).match(/\\d+/); return m ? parseInt(m[0]) : (f.includes('ใต้ดิน') ? -1 : 999); };\n    const floorProgress = [...fp.entries()].map(([floor, o]) => ({\n      floor, total: fmt(o.total), checked: fmt(o.checked),\n      pct: o.total ? Math.round(o.checked / o.total * 100) : 0,\n      barColor: '#0e7c86',\n    })).sort((a, b) => floorNum(a.floor) - floorNum(b.floor));\n\n    // work-type progress (by AO / workType)\n    const wp = new Map();\n    for (const a of s.assets) {\n      const w = this.clean(a.workType) || 'ไม่ระบุประเภท';\n      if (!wp.has(w)) wp.set(w, { total: 0, checked: 0 });\n      const o = wp.get(w); o.total++; if (this.effStatus(a.code)) o.checked++;\n    }\n    const workProgress = [...wp.entries()].map(([work, o]) => ({\n      work, total: fmt(o.total), checked: fmt(o.checked), rawTotal: o.total,\n      pct: o.total ? Math.round(o.checked / o.total * 100) : 0,\n      barColor: '#7c4ddb',\n    })).sort((a, b) => b.rawTotal - a.rawTotal);\n\n    // ---- list ----\n    const term = s.searchTerm.trim().toUpperCase();\n    let filtered = s.assets;\n    if (term) filtered = filtered.filter(a => this.norm(a.code).includes(term) || (a.name || '').toUpperCase().includes(term));\n    if (s.filterFloor) filtered = filtered.filter(a => this.normFloor(a.srcFloor) === s.filterFloor);\n    if (s.filterStatus !== 'all') {\n      filtered = filtered.filter(a => {\n        const st = this.effStatus(a.code);\n        if (s.filterStatus === 'unchecked') return !st;\n        if (s.filterStatus === 'checked') return !!st && st !== 'ไม่พบ';\n        if (s.filterStatus === 'notfound') return st === 'ไม่พบ';\n        return true;\n      });\n    }\n    const listTotal = filtered.length;\n    const visibleList = filtered.slice(0, s.listLimit).map(a => {\n      const st = this.effStatus(a.code);\n      const meta = st ? (STATUS[st] || { bg: '#eef1f5', color: '#6b7688', short: st }) : null;\n      return {\n        code: a.code, name: a.name || '—',\n        srcLabel: [this.normFloor(a.srcFloor), this.clean(a.srcDept)].filter(Boolean).join(' · ') || '—',\n        badge: meta ? meta.short : 'ยังไม่ตรวจ',\n        badgeBg: meta ? meta.bg : '#eef1f5',\n        badgeColor: meta ? meta.color : '#94a3b8',\n        onOpen: () => this.openDetail(a),\n      };\n    });\n    const statusFilterDefs = [['all', 'ทั้งหมด'], ['unchecked', 'ยังไม่ตรวจ'], ['checked', 'ตรวจแล้ว'], ['notfound', 'ไม่พบ']];\n    const statusFilters = statusFilterDefs.map(([id, label]) => {\n      const active = s.filterStatus === id;\n      return { label, onClick: () => this.setState({ filterStatus: id, listLimit: 50 }),\n        bg: active ? '#0e7c86' : '#fff', color: active ? '#fff' : '#5a6678', border: active ? '#0e7c86' : '#dde3ec' };\n    });\n    const floorFilterOpts = [...new Set(s.assets.map(a => this.normFloor(a.srcFloor)).filter(Boolean))]\n      .sort((a, b) => floorNum(a) - floorNum(b));\n\n    // recent\n    const recentScans = s.recent.map(r => {\n      const a = this.index ? this.index.get(this.norm(r.code)) : null;\n      const st = r.found ? this.effStatus(r.code) : '';\n      const meta = st ? STATUS[st] : null;\n      return {\n        code: r.code, time: r.time,\n        label: !r.found ? 'ไม่พบในฐานข้อมูล' : (a ? (a.name || '—') : '—'),\n        dotColor: !r.found ? '#dc2626' : (meta ? meta.color : '#94a3b8'),\n        onOpen: () => { if (a) this.openDetail(a); else this.showToast('err', 'ไม่พบรหัสนี้', 1800); },\n      };\n    });\n\n    // ---- detail ----\n    const cur = s.current;\n    const d = s.draft || {};\n    let detailFields = [], statusOptions = [], curAlreadyChecked = false, curPrevStatus = '', curPrevBg = '', curPrevColor = '';\n    let saveBtnBg = '#0e7c86', saveBtnLabel = 'บันทึกผลการตรวจ', saveBtnOpacity = 1;\n    if (cur) {\n      const live = s.liveData[this.norm(cur.code)];   // ค่าจริงจาก Sheet (ถ้าดึงมาได้)\n      const g = (k, emb) => { const lv = live ? this.clean(live[k]) : ''; return lv || this.clean(emb); };\n      const f = [\n        ['รหัสครุภัณฑ์', cur.code], ['ชื่อทรัพย์สิน', g('name', cur.name)], ['หมายเหตุ', g('note', cur.note)],\n        ['ที่ตั้งเดิม', g('origLoc', cur.origLoc)], ['New! Location', g('placeLoc', cur.placeLoc)], ['ประเภทงาน', g('workType', cur.workType)],\n      ];\n      detailFields = f.map((x, i) => ({ label: x[0], value: x[1] ? x[1] : '—', border: i === f.length - 1 ? 'transparent' : '#f0f2f5' }));\n      statusOptions = STATUS_ORDER.map(st => {\n        const m = STATUS[st]; const sel = d.status === st;\n        return { label: st, onClick: () => this.setDraftStatus(st),\n          border: sel ? m.color : '#e7ebf1', bg: sel ? m.bg : '#fff',\n          dot: sel ? m.color : '#c3cad6', dotFill: '#fff', innerDot: sel ? m.color : 'transparent',\n          textColor: sel ? m.color : '#3a4658' };\n      });\n      const prevStored = this.state.edits[this.norm(cur.code)];\n      const rem = this.state.remote[this.norm(cur.code)];\n      const prev = (prevStored && prevStored.status) || (live && this.clean(live.status)) || (rem && this.clean(rem.status)) || cur.status;\n      if (prev) { curAlreadyChecked = true; curPrevStatus = prev; const pm = STATUS[prev] || {}; curPrevBg = pm.bg || '#fff3da'; curPrevColor = pm.color || '#a06a00'; }\n      if (!d.status) { saveBtnBg = '#c3cad6'; saveBtnOpacity = .7; saveBtnLabel = 'เลือกสถานะก่อนบันทึก'; }\n      else { saveBtnLabel = 'บันทึก: ' + (STATUS[d.status] ? STATUS[d.status].short : d.status); }\n    }\n\n    // toast\n    const t = s.toast;\n    const toastBg = t ? (t.type === 'ok' ? '#16a34a' : t.type === 'err' ? '#dc2626' : '#334155') : '#334155';\n    const toastIcon = t ? (t.type === 'ok' ? '✓' : t.type === 'err' ? '!' : 'ⓘ') : '';\n\n    // conn msg\n    const cm = s.connMsg;\n    const connMsgBg = cm ? (cm.type === 'ok' ? '#dcfce7' : cm.type === 'err' ? '#fee2e2' : '#e8eef5') : '';\n    const connMsgColor = cm ? (cm.type === 'ok' ? '#15803d' : cm.type === 'err' ? '#c0392b' : '#3a4658') : '';\n\n    return {\n      loading: s.loading, ready,\n      isScan: ready && s.view === 'scan', isList: ready && s.view === 'list',\n      isProgress: ready && s.view === 'progress', isSettings: ready && s.view === 'settings',\n      navItems,\n      // sync chip\n      syncChipLabel, syncDotColor, syncChipBg, syncChipColor,\n      onSyncNow: () => this.syncNow(),\n      // camera\n      videoRef: this.videoRef, canvasRef: this.canvasRef,\n      cameraOn: s.cameraOn, cameraOff: !s.cameraOn,\n      videoDisplay: s.cameraOn ? 'block' : 'none',\n      camBtnLabel: s.cameraOn ? 'หยุดกล้อง' : 'เปิดกล้องสแกน',\n      camBtnBg: s.cameraOn ? '#c0392b' : '#0e7c86',\n      onToggleCamera: () => this.toggleCamera(),\n      continuous: s.continuous, onToggleContinuous: () => this.setState({ continuous: !s.continuous }),\n      contColor: s.continuous ? '#0e7c86' : '#8a96a8', contBg: s.continuous ? '#e6f5f4' : '#fff',\n      contBorder: s.continuous ? '#0e7c86' : '#dde3ec', contFill: s.continuous ? '#0e7c86' : 'transparent',\n      // manual\n      manualRef: this.manualRef,\n      manualCode: s.manualCode, onManualChange: e => this.setState({ manualCode: e.target.value }),\n      onManualSubmit: e => { e.preventDefault(); const v = s.manualCode.trim(); if (v) { this.lookup(v); this.setState({ manualCode: '' }); } this.focusSearch(); },\n      // recent\n      recentScans, hasRecent: recentScans.length > 0, noRecent: recentScans.length === 0,\n      onClearRecent: () => { this.persistRecent([]); this.setState({ recent: [] }); },\n      // list\n      searchTerm: s.searchTerm, onSearchChange: e => this.setState({ searchTerm: e.target.value, listLimit: 50 }),\n      statusFilters, filterFloor: s.filterFloor, floorFilterOpts,\n      onFloorFilterChange: e => this.setState({ filterFloor: e.target.value, listLimit: 50 }),\n      visibleList, listCountLabel: fmt(listTotal),\n      canLoadMore: listTotal > s.listLimit, listEmpty: listTotal === 0,\n      onLoadMore: () => this.setState({ listLimit: s.listLimit + 50 }),\n      // progress\n      pct, checkedLabel: fmt(checked), totalLabel: fmt(total), statCards, floorProgress, workProgress,\n      // detail\n      hasCurrent: !!cur, cur: cur || {}, detailFields, statusOptions,\n      liveLoading: !!cur && s.liveLoading,\n      // asset photo\n      imgTry: !!cur && s.imgStatus === 'ok',\n      imgBoxDisplay: 'block',\n      imgCodeLabel: cur ? this.imgCodeFor(cur.name) : '',\n      imgEl: (cur && s.imgStatus === 'ok' && s.imgUrl) ? React.createElement('img', {\n        src: s.imgUrl,\n        style: { width: '100%', maxHeight: '260px', objectFit: 'contain', display: 'block', background: '#11161f' },\n      }) : null,\n      curAlreadyChecked, curPrevStatus, curPrevBg, curPrevColor,\n      draftFloor: d.floor || '', draftDept: d.dept || '', draftRoom: d.room || '',\n      onDraftFloor: e => this.setDraft('floor', e.target.value),\n      onDraftDept: e => this.setDraft('dept', e.target.value),\n      onDraftRoom: e => this.setDraft('room', e.target.value),\n      onSaveCurrent: () => this.saveCurrent(), onCloseDetail: () => this.closeDetail(),\n      saveBtnBg, saveBtnLabel, saveBtnOpacity, stopProp: e => e.stopPropagation(),\n      floorOpts: s.options.floors, deptOpts: s.options.depts, roomOpts: s.options.rooms,\n      // settings\n      webhookUrl: s.webhookUrl, onWebhookChange: e => this.setWebhook(e.target.value),\n      onTestConn: () => this.testConn(), pendingCount: pending,\n      onPull: () => this.pullFromSheet(false),\n      hasConnMsg: !!cm, connMsg: cm ? cm.text : '', connMsgBg, connMsgColor,\n      onExport: () => this.exportCsv(), onResetLocal: () => this.resetLocal(),\n      imgBase: s.imgBase,\n      onImgBaseChange: e => { const v = e.target.value; this.setState({ imgBase: v }); try { localStorage.setItem(LS_IMGBASE, v); } catch (_) {} },\n      localEditLabel: fmt(Object.keys(s.edits).length),\n      // toast\n      hasToast: !!t, toastMsg: t ? t.text : '', toastBg, toastIcon,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
